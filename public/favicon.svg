<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1B2A3D"/>
  <!-- Blueprint grid lines (subtle) -->
  <line x1="8" y1="32" x2="56" y2="32" stroke="#5B8DBF" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="32" y1="8" x2="32" y2="56" stroke="#5B8DBF" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- A letterform (architectural sans) -->
  <path d="M20 48 L32 16 L44 48" stroke="#F4F5F3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar of A in brass -->
  <line x1="24.5" y1="37" x2="39.5" y2="37" stroke="#A8743C" stroke-width="3" stroke-linecap="round"/>
  <!-- Corner crop marks (blueprint drawing convention) -->
  <line x1="4" y1="4" x2="10" y2="4" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="4" y1="4" x2="4" y2="10" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="60" y1="4" x2="54" y2="4" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="60" y1="4" x2="60" y2="10" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="4" y1="60" x2="10" y2="60" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="4" y1="60" x2="4" y2="54" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="60" y1="60" x2="54" y2="60" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="60" y1="60" x2="60" y2="54" stroke="#5B8DBF" stroke-width="1" stroke-opacity="0.6"/>
</svg>
